name: Documentation

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - '.markdownlint.json'
  pull_request:
    branches: [main]
    paths:
      - '**.md'
      - '.markdownlint.json'

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g markdownlint-cli2
      - run: markdownlint-cli2 "**/*.md" "!node_modules" "!.next"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - run: npm run lint
